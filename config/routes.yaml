# yaml-language-server: $schema=../vendor/symfony/routing/Loader/schema/routing.schema.json

# This file is the entry point to configure the routes of your app.
# Methods with the #[Route] attribute are automatically imported.
# See also https://symfony.com/doc/current/routing.html

# To list all registered routes, run the following command:
#   bin/console debug:router

catalog_controllers:
    resource:
        path: ../src/Catalog/UI/Http/
        namespace: App\Catalog\UI\Http
    type: attribute

inventory_controllers:
    resource:
        path: ../src/Inventory/UI/Http/
        namespace: App\Inventory\UI\Http
    type: attribute

auth_controllers:
    resource:
        path: ../src/Auth/UI/Http/
        namespace: App\Auth\UI\Http
    type: attribute

cart_controllers:
    resource:
        path: ../src/Cart/UI/Http/
        namespace: App\Cart\UI\Http
    type: attribute

order_controllers:
    resource:
        path: ../src/Order/UI/Http/
        namespace: App\Order\UI\Http
    type: attribute

# App-level controllers (homepage / health) — shared UI boundary.
app_controllers:
    resource:
        path: ../src/Shared/UI/Http/
        namespace: App\Shared\UI\Http
    type: attribute
