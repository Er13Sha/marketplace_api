framework:
    messenger:
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                # PHP 8.4 + this PDO build: PDO::connect() returns a base \PDO,
                # not \Pdo\Pgsql, so the LISTEN/NOTIFY path (getNotify()) fatals.
                # Fall back to plain SELECT ... FOR UPDATE SKIP LOCKED polling.
                options:
                    use_notify: false
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed:
                dsn: 'doctrine://default?queue_name=failed'
                options:
                    use_notify: false
            # sync: 'sync://'

        default_bus: command.bus

        buses:
            command.bus: []
            query.bus: []
            event.bus:
                default_middleware: allow_no_handlers

        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async
            App\Catalog\Domain\Event\ProductCreatedEvent: async
            App\Catalog\Domain\Event\ProductUpdatedEvent: async
            App\Inventory\Application\Command\LogStockOperationCommand: async

            # Route your messages to the transports
            # 'App\Message\YourMessage': async
