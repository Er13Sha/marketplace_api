doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'
        charset: 'utf8mb4'
        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        types:
            product_id: App\Catalog\Infrastructure\Doctrine\Type\ProductIdType
        mapping_types:
            product_id: string
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: false
        mappings:
            catalog:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Catalog/Infrastructure/Doctrine/Mapping'
                prefix: 'App\Catalog\Domain'
                alias: Catalog

            inventory:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Inventory/Infrastructure/Doctrine/Entity'
                prefix: 'App\Inventory\Infrastructure\Doctrine\Entity'
                alias: Inventory

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
